services:
  postgres:
    image: postgres:16
    env_file:
      - ./.env
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 3s
      retries: 10
    ports:
      - "5432:5432"
    volumes:
      - expense_pgdata:/var/lib/postgresql/data

  api:
    build:
      context: ./server
    env_file:
      - ./.env
    environment:
      PGHOST: ${PGHOST}
      PGPORT: ${PGPORT}
      PGUSER: ${PGUSER}
      PGPASSWORD: ${PGPASSWORD}
      PGDATABASE: ${PGDATABASE}
      PORT: ${PORT}
    depends_on:
      postgres:
        condition: service_healthy

  web:
    build:
      context: .
    ports:
      - "8080:80"
    depends_on:
      - api

volumes:
  expense_pgdata:
